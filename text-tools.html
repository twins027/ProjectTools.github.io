<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Word / Phrase Definition</title><style>  body {    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;    background: #121212;    color: #e0e0e0;    margin: 0;    padding: 0;  }  .container {    max-width: 600px;    margin: 50px auto;    background: #1e1e1e;    padding: 25px 30px;    border-radius: 15px;    box-shadow: 0 10px 25px rgba(0,0,0,0.5);  }  h1 {    color: #4fc3f7;    text-align: center;    margin-bottom: 20px;  }  textarea {    width: 100%;    height: 130px;    padding: 12px;    background: #2a2a2a;    color: #e0e0e0;    border: none;    border-radius: 10px;    resize: none;    font-size: 16px;  }  textarea:focus {    outline: 2px solid #4fc3f7;  }  button {    margin-top: 15px;    width: 100%;    padding: 12px;    border: none;    border-radius: 10px;    background: #4fc3f7;    color: #121212;    font-size: 16px;    font-weight: bold;    cursor: pointer;    transition: 0.2s;  }  button:hover {    background: #29b6f6;  }  #output {    margin-top: 20px;    background: #2a2a2a;    padding: 15px;    border-radius: 10px;    min-height: 80px;    line-height: 1.6;    font-size: 16px;    overflow-y: auto;  }  ::-webkit-scrollbar {    width: 8px;  }  ::-webkit-scrollbar-thumb {    background: #4fc3f7;    border-radius: 4px;  }  ::-webkit-scrollbar-track {    background: #1e1e1e;  }</style></head><body><div class="container">  <h1>Define Word / Phrase</h1>  <textarea id="input" placeholder="Type or paste a word or phrase..."></textarea>  <button onclick="defineText()">Define</button>  <div id="output"></div></div><script>const output = document.getElementById("output");function defineText() {  const text = document.getElementById("input").value.trim();  if (!text) {    output.innerHTML = "<em>Enter a word or phrase first!</em>";    return;  }  output.innerHTML = "<em>Loading definition...</em>";  // Try dictionary API first (works for single words)  fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(text))    .then(res => res.json())    .then(data => {      if (data[0] && data[0].meanings) {        const meanings = data[0].meanings.map(m => m.definitions[0].definition).join("<br><br>");        output.innerHTML = meanings;      } else {        throw new Error("Not found in dictionary");      }    })    .catch(() => {      // Fallback to Wikipedia summary (works for phrases)      fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(text))        .then(res => res.json())        .then(data => {          output.innerHTML = data.extract || "<em>No definition found 😭</em>";        })        .catch(() => {          output.innerHTML = "<em>No definition found 😭</em>";        });    });}</script></body></html>
